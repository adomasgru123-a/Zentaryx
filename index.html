<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zentaryx</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          <h2>API Settings</h2>
        </div>
        <button class="modal-close" id="closeSettings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label class="setting-label">Anthropic API Key</label>
          <p class="setting-desc">Stored locally in your browser — never sent anywhere except directly to the Anthropic API.</p>
          <div class="input-row">
            <input type="password" id="apiKeyInput" class="setting-input" placeholder="sk-ant-..." />
            <button class="btn-show-key" id="toggleKey">Show</button>
          </div>
        </div>
        <div class="setting-group">
          <label class="setting-label">Model</label>
          <select class="setting-input" id="modelSelect">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Recommended)</option>
            <option value="claude-opus-4-7">Claude Opus 4.7 (Most Capable)</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Fastest)</option>
          </select>
        </div>
        <div class="setting-group">
          <label class="setting-label">System Prompt</label>
          <textarea class="setting-input setting-textarea" id="systemPrompt" placeholder="You are a helpful assistant...">You are Zentaryx, a helpful and knowledgeable AI assistant. Be concise, friendly, and accurate.</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelSettings">Cancel</button>
        <button class="btn-primary" id="saveSettings">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-icon">Z</div>
          <span class="logo-text">Zentaryx</span>
        </div>
        <button class="icon-btn sidebar-toggle-btn" id="sidebarToggle" title="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>

      <!-- Agent Tabs -->
      <div class="agent-tabs">
        <button class="agent-tab active" data-agent="assistant">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          Assistant
        </button>
        <button class="agent-tab" data-agent="coder">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Coder
        </button>
        <button class="agent-tab" data-agent="analyst">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Analyst
        </button>
      </div>

      <!-- Chat History -->
      <div class="history-section">
        <div class="history-label">Recent Chats</div>
        <div class="history-list" id="historyList">
          <div class="history-empty">No chats yet.</div>
        </div>
      </div>

      <!-- Sidebar Bottom -->
      <div class="sidebar-bottom">
        <button class="sidebar-bottom-btn" id="openSettings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Settings
        </button>
        <div class="user-chip">
          <div class="user-avatar">U</div>
          <span>User</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">

      <!-- Header -->
      <header class="topbar">
        <button class="icon-btn mobile-sidebar-btn" id="mobileSidebarBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="topbar-spacer"></div>

        <div class="topbar-actions">
          <button class="icon-btn" id="clearChatBtn" title="Clear chat">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>

          <!-- Connected pill -->
          <div class="topbar-connection">
            <span class="conn-dot" id="connDot"></span>
            <span class="conn-label" id="connLabel">Not connected</span>
            <button class="btn-change" id="topSettingsBtn">Change</button>
          </div>
        </div>
      </header>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea">

        <!-- Welcome Screen -->
        <div class="welcome" id="welcomeScreen">
          <h1 class="welcome-title">Hello, how can I help you today?</h1>
          <!-- input moves here in welcome mode -->
          <div id="welcomeInputSlot"></div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages"></div>

      </div>

      <!-- Input Area — JS moves this between #welcomeInputSlot and #main -->
      <div class="input-area" id="inputArea">
        <div class="input-pill">
          <button class="pill-btn-left" title="Attach (coming soon)" disabled>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <textarea class="chat-input" id="chatInput" placeholder="Write your prompt here..." rows="1"></textarea>
          <div class="pill-model-wrap">
            <select class="pill-model-select" id="pillModelSelect">
              <option value="claude-sonnet-4-6">Sonnet 4.6</option>
              <option value="claude-opus-4-7">Opus 4.7</option>
              <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
            </select>
            <svg class="pill-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

        <!-- Mode tabs — visible on welcome screen only -->
        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab active" data-mode="chatbot">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chatbot
          </button>
          <button class="mode-tab" data-mode="agent">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
            Agent
          </button>
          <button class="mode-tab" data-mode="automation">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
            Automation
          </button>
          <button class="mode-tab" data-mode="code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Code
          </button>
          <button class="mode-tab" data-mode="chrome">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg>
            Chrome
          </button>
        </div>

        <p class="input-disclaimer">Zentaryx can make mistakes. Verify important info.</p>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
